<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XV’s Renatta 🌺</title>

<!-- CACHE FIX -->
<link rel="stylesheet" href="style.css?v=9999">

</head>

<body>

<div id="inicio">
  <div class="inicio-card">
    <h1>🌺 XV’s Renatta 🌺</h1>
    <p>Estás invitado a una experiencia especial</p>
    <button id="btnAbrir">💌 Abrir invitación</button>
  </div>
</div>

<div class="overlay">

<section class="card">
<h1>🌺 Aloha 🌺</h1>
<h2>Renatta</h2>

<div class="info">
<span class="fecha">📅 20 Junio</span>
<span class="hora">⏰ 5:00pm - 10:00pm</span>
</div>

<p id="contador"></p>
<h3 id="pases"></h3>

<button id="toggleMusica" class="btn">🎵 Pausar música</button>
</section>

<section class="card">
<h2>🌸 Dress Code</h2>
<img src="dresscode.png" class="img">
</section>

<section class="card">
<h2>💌 Sobre</h2>
<img src="sobre.png" class="img">
</section>

<section class="card">
<h2>📍 Ubicación</h2>
<a href="https://www.google.com/maps/place/Palapa+El+Fresno" class="btn">Ver ubicación</a>
</section>

<section class="card">
<h2>📲 Confirmar</h2>
<a href="https://wa.me/528443884334" class="btn">Confirmar</a>
</section>

</div>

<audio id="musica" loop>
<source src="musica.mp3">
</audio>

<script src="script.js?v=9999"></script>
</body>
</html>
